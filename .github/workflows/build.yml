name: Build FarmBot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: farmbot-builder:latest

      - name: Build APK
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app farmbot-builder:latest buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: farmbot.apk
          path: ${{ github.workspace }}/bin/*.apk
