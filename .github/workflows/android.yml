name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer Docker
        run: |
          docker run --rm \
            -v "$(pwd)":/home/user/project \
            -w /home/user/project \
            kivy/buildozer:stable \
            bash -c "pip install --upgrade pip && buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: farmbot-debug.apk
          path: bin/*.apk
